worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile        on;
    tcp_nopush      on;   # 配合 sendfile，减少网络包数量
    tcp_nodelay     on;   # 减少延迟
    keepalive_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    client_max_body_size 20M;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_vary on;

    # 限流与连接数控制
    limit_req_zone $binary_remote_addr zone=chat_stream_rl:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=chat_approve_rl:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api_general_rl:10m rate=30r/s;
    # 认证端点专用限流（防暴力登录 / 批量注册）
    limit_req_zone $binary_remote_addr zone=auth_login_rl:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth_register_rl:10m rate=2r/m;
    limit_conn_zone $binary_remote_addr zone=chat_conn:10m;
    limit_req_status 429;

    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        # 前端 SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 聊天流式接口（SSE）单独处理，重点限流
        location ~ ^/api/v1/chat/[^/]+/stream$ {
            limit_req zone=chat_stream_rl burst=5 nodelay;
            limit_conn chat_conn 10;

            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering "no";
            add_header Retry-After "60" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600;
        }

        # 聊天审批接口限流（比 stream 宽松）
        location ~ ^/api/v1/chat/[^/]+/approve-tool$ {
            limit_req zone=chat_approve_rl burst=10 nodelay;

            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering "no";
            add_header Retry-After "60" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 登录端点：专用限流（防凭据撞库）
        location = /api/v1/auth/login {
            limit_req zone=auth_login_rl burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend:8000/api/v1/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Retry-After "60" always;
        }

        # 注册端点：专用限流（防批量注册）
        location = /api/v1/auth/register {
            limit_req zone=auth_register_rl burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://backend:8000/api/v1/auth/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Retry-After "60" always;
        }

        # API
        location /api/v1/ {
            limit_req zone=api_general_rl burst=60 nodelay;

            proxy_pass http://backend:8000/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Retry-After "60" always;
        }

        # 文件下载
        location /files/ {
            alias /data/uploads/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }
    }
}
